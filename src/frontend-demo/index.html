<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dotaz — Demo</title>
    <script>
      // Register coi-serviceworker to enable SharedArrayBuffer (required for sqlite-wasm)
      // without needing server-side COEP/COOP headers (e.g. on GitHub Pages).
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./coi-serviceworker.js").then(function () {
          if (!crossOriginIsolated) location.reload();
        });
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
